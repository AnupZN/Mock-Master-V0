<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>

    <!-- Glowing Violet Gradient for Hexagon -->
    <linearGradient id="violetGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>

    <!-- Warm Highlight Gradient -->
    <linearGradient id="highlightGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0.3" />
    </linearGradient>

    <!-- Drop Shadow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#8b5cf6" flood-opacity="0.25" />
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Background Base (Rounded App Icon Card) -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />

  <!-- Inner Decorative Border -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="none" stroke="url(#highlightGrad)" stroke-width="4" opacity="0.15" />

  <!-- Center Group with Glow -->
  <g filter="url(#glow)">
    <!-- Modular Hexagon Base -->
    <polygon points="256,96 394,176 394,336 256,416 118,336 118,176" fill="none" stroke="url(#violetGrad)" stroke-width="20" stroke-linejoin="round" />
    
    <!-- Outer accent lines for modularity -->
    <path d="M 256,96 L 256,210" stroke="url(#violetGrad)" stroke-width="12" stroke-linecap="round" opacity="0.5" />
    <path d="M 118,176 L 218,233" stroke="url(#violetGrad)" stroke-width="12" stroke-linecap="round" opacity="0.5" />
    <path d="M 394,176 L 294,233" stroke="url(#violetGrad)" stroke-width="12" stroke-linecap="round" opacity="0.5" />

    <!-- Sleek Minimal Graduation Cap / Book Hybrid Graphic in the Center -->
    <!-- Cap Roof / Diamond -->
    <polygon points="256,150 340,192 256,234 172,192" fill="url(#violetGrad)" />
    
    <!-- Cap Base / Pillars -->
    <path d="M 210,230 L 210,270 C 210,290 302,290 302,270 L 302,230" fill="none" stroke="#ffffff" stroke-width="14" stroke-linecap="round" />
    
    <!-- Tassel -->
    <path d="M 256,192 L 150,225 L 150,265" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.9" />
    <circle cx="150" cy="268" r="6" fill="#ffffff" />

    <!-- Pages of Book / Wings at Bottom -->
    <path d="M 180,310 C 220,330 250,320 256,315 C 262,320 292,330 332,310" fill="none" stroke="url(#violetGrad)" stroke-width="12" stroke-linecap="round" />
    <path d="M 180,330 C 220,350 250,340 256,335 C 262,340 292,350 332,330" fill="none" stroke="url(#violetGrad)" stroke-width="12" stroke-linecap="round" opacity="0.7" />
  </g>
</svg>
